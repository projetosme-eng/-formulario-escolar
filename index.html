Longitude: -
</div>

<button class="btn-enviar" onclick="enviar()">Enviar Registro</button>

<div class="msg" id="msg"></div>

</div>

<script>

const SUPABASE_URL = "https://hqefobmvtojrwyoqgzak.supabase.co"
const SUPABASE_KEY = "sb_publishable_graMCVLAAM5yDapKLKrAhw_JXX0xvlZ"

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let latitude = null
let longitude = null

function capturar(){

const campo = document.getElementById("local")

campo.innerHTML = "Capturando localização..."

navigator.geolocation.getCurrentPosition(

function(pos){

latitude = pos.coords.latitude
longitude = pos.coords.longitude

campo.innerHTML =
"Latitude: " + latitude +
"<br>Longitude: " + longitude

},

function(){

campo.innerHTML = "Permita acesso à localização no navegador"

}

)

}

async function enviar(){

if(latitude == null){

alert("Primeiro capture a localização")

return

}

const responsavel = document.getElementById("responsavel").value
const endereco = document.getElementById("endereco").value
const aluno = document.getElementById("aluno").value
const escola = document.getElementById("escola").value
const ano = document.getElementById("ano").value
const rota = document.getElementById("rota").value

const { error } = await supabase
.from("cadastro_transporte")
.insert([{

responsavel: responsavel,
endereco: endereco,
aluno: aluno,
escola: escola,
ano: ano,
rota: rota,
latitude: latitude,
longitude: longitude

}])

if(error){

alert("Erro ao enviar: " + error.message)

}else{

document.getElementById("msg").innerHTML =
"✅ Registro enviado com sucesso!"

}

}

</script>
