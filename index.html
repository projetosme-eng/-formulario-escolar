<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cadastro Transporte Escolar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef3ff;display:flex;justify-content:center;min-height:100vh;padding:0}
.container{max-width:700px;width:100%;background:white;margin:16px;padding:20px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.12)}
.logo{width:180px;display:block;margin:0 auto 12px;max-width:100%}
h2{text-align:center;color:#1a3a5c;margin-bottom:20px;font-size:clamp(18px,5vw,24px)}
.form-group{margin-bottom:14px}
label{font-weight:600;display:block;margin-bottom:4px;color:#333;font-size:14px}
input,select{width:100%;padding:12px;border-radius:8px;border:1.5px solid #d0d5dd;font-size:16px;background:#fff;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#1a3a5c;box-shadow:0 0 0 3px rgba(26,58,92,0.12)}
button{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
button:active{opacity:.8}
.btn-gps{background:#f39c12;color:#fff;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gps:disabled{opacity:.5;cursor:not-allowed}
.btn-enviar{background:#27ae60;color:#fff;margin-top:12px}
.btn-enviar:disabled{opacity:.5;cursor:not-allowed}
.box-gps{background:#f0f4ff;padding:14px;border-radius:8px;margin-top:8px;font-size:14px;border-left:4px solid #f39c12;word-break:break-all}
.box-gps.capturado{border-left-color:#27ae60;background:#f0faf4}
.box-gps.erro{border-left-color:#e74c3c;background:#fef0ef}
.coord-label{font-weight:600;color:#555}
.coord-value{font-weight:700;color:#1a3a5c}
.map-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;color:#2d6a9f;font-size:13px;text-decoration:none}
.map-link:hover{text-decoration:underline}
.msg{margin-top:16px;font-weight:600;text-align:center;padding:10px;border-radius:8px;display:none}
.msg.sucesso{display:block;background:#e8f8ef;color:#1e7e4a;padding:14px}
.msg.erro{display:block;background:#fde8e8;color:#c0392b;padding:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.row{grid-template-columns:1fr}}
.limpar{background:none;border:1px solid #ccc;color:#666;padding:10px;margin-top:8px;font-weight:400}
.loading-supabase{text-align:center;padding:20px;color:#999;font-size:14px}
</style>
</head>
<body>

<div class="container">

<img src="logo.png" class="logo" onerror="this.style.display='none'">
<h2>Cadastro Transporte Escolar</h2>

<div class="form-group">
  <label>Nome do Responsável</label>
  <input id="responsavel" placeholder="Nome completo">
</div>

<div class="form-group">
  <label>Fazenda / Sítio / Chácara</label>
  <input id="endereco" placeholder="Nome da propriedade">
</div>

<div class="form-group">
  <label>Nome do Aluno</label>
  <input id="aluno" placeholder="Nome completo do aluno">
</div>

<div class="row">
  <div class="form-group">
    <label>Escola</label>
    <select id="escola">
      <option value="">Selecione...</option>
      <option>E.E ARTUR ANTUNES MACIEL</option>
      <option>CEM Dr. GUILHERME</option>
      <option>CEM PROFESSOR ORLANDO PEREIRA</option>
      <option>EMR OSVALDO CRUZ</option>
      <option>EMR EUCLIDES DA CUNHA</option>
      <option>EMR VINICIOS DE MORAIS</option>
      <option>EE. ANTONIO FRANCISCO LISBOA</option>
      <option>ANEXA RIO PRETO</option>
      <option>ALVARES DE AZEVEDO</option>
      <option>CORA CORALINA</option>
      <option>IFMT</option>
    </select>
  </div>
  <div class="form-group">
    <label>Ano Escolar</label>
    <select id="ano">
      <option value="">Selecione...</option>
      <option>PRÉ I</option>
      <option>PRÉ II</option>
      <option>1º ANO</option>
      <option>2º ANO</option>
      <option>3º ANO</option>
      <option>4º ANO</option>
      <option>5º ANO</option>
      <option>6º ANO</option>
      <option>7º ANO</option>
      <option>8º ANO</option>
      <option>9º ANO</option>
      <option>1º ANO ENSINO MÉDIO</option>
      <option>2º ANO ENSINO MÉDIO</option>
      <option>3º ANO ENSINO MÉDIO</option>
    </select>
  </div>
</div>

<div class="form-group">
  <label>Rota</label>
  <select id="rota">
    <option value="">Selecione...</option>
    <option>ROTA 08/07/LISBOA</option>
    <option>ROTA 09/07/LISBOA</option>
    <option>ROTA FLOR DA SERRA/LISBOA</option>
    <option>ROTA LINHA J/RIO PRETO/URBANO</option>
    <option>ROTA 01/04/EUCLIDES</option>
    <option>ROTA 01/04/LISBOA</option>
    <option>ROTA 01/21/TERRA ROXA</option>
    <option>ROTA 04/G/EUCLIDES</option>
    <option>ROTA 05/CAIABI/LISBOA</option>
    <option>ROTA 06/TODOS OS SANTOS/LISBOA</option>
    <option>ROTA BARROSO/URBANO</option>
    <option>ROTA BOI BOM/RIO AZUL/PARANÁ - OSVALDO CRUZ</option>
    <option>ROTA BR 170 RIO PRETO FAZENDA AMALIA/URBANO</option>
    <option>ROTA BR 170/VAN/URBANO</option>
    <option>ROTA BR 174/03/TERRA ROXA</option>
    <option>ROTA BR ARIPUANÃ / PARANÁ 02 - OSVALDO CRUZ</option>
    <option>ROTA CAIABI/G/LISBOA</option>
    <option>ROTA COMUNIDADE N.S. SALETE/LISBOA</option>
    <option>ROTA F/USINA/TERRA ROXA</option>
    <option>ROTA FONTANILLAS/URBANO</option>
    <option>ROTA GLEBA RIO DO OURO</option>
    <option>ROTA IRACEMA 01</option>
    <option>ROTA IRACEMA 02</option>
    <option>ROTA IRACEMA 03</option>
    <option>ROTA LINHA F/04</option>
    <option>ROTA PESQUEIRO</option>
    <option>ROTA PESQUISA</option>
    <option>ROTA RIO PRETO</option>
    <option>ROTA SÃO JUSTINO</option>
    <option>ROTA SETOR AEROPORTO</option>
    <option>ROTA SHEKINAN</option>
    <option>ROTA USINA</option>
    <option>ROTA VALE DO JUINÃO</option>
  </select>
</div>

<button class="btn-gps" id="btnGps">Capturar Localizacao</button>

<div class="box-gps" id="boxGps">
  <span class="coord-label">Latitude:</span>
  <span class="coord-value" id="latDisplay">-</span><br>
  <span class="coord-label">Longitude:</span>
  <span class="coord-value" id="lngDisplay">-</span>
  <span id="mapLinkContainer"></span>
</div>

<button class="btn-enviar" id="btnEnviar">Enviar Registro</button>
<button class="limpar" id="btnLimpar">Limpar formulário</button>

<div class="msg" id="msg"></div>

</div>

<script>
var SUPABASE_URL = "https://hqefobmvtojrwyoqgzak.supabase.co"
var SUPABASE_KEY = "sb_publishable_graMCVLAAM5yDapKLKrAhw_JXX0xvlZ"
var supabase = null
var latitude = null
var longitude = null
var capturando = false

try {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
} catch(e) {
  console.error('Erro ao conectar Supabase:', e)
}

function capturar() {
  if (capturando) return
  capturando = true

  var btn = document.getElementById('btnGps')
  var box = document.getElementById('boxGps')
  var latEl = document.getElementById('latDisplay')
  var lngEl = document.getElementById('lngDisplay')
  var linkEl = document.getElementById('mapLinkContainer')

  btn.disabled = true
  btn.textContent = 'Capturando...'
  box.className = 'box-gps'
  latEl.textContent = '...'
  lngEl.textContent = '...'
  linkEl.innerHTML = ''

  if (!navigator.geolocation) {
    box.className = 'box-gps erro'
    latEl.textContent = '-'
    lngEl.textContent = '-'
    linkEl.innerHTML = 'GPS nao suportado neste navegador.'
    btn.disabled = false
    btn.textContent = 'Capturar Localizacao'
    capturando = false
    return
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      latitude = pos.coords.latitude
      longitude = pos.coords.longitude

      latEl.textContent = latitude
      lngEl.textContent = longitude
      box.className = 'box-gps capturado'
      linkEl.innerHTML = '<a class="map-link" href="https://www.google.com/maps?q=' + latitude + ',' + longitude + '" target="_blank">  Ver no Google Maps</a>'

      btn.disabled = false
      btn.textContent = 'Localizacao Capturada'
      capturando = false
    },
    function(err) {
      var bx = document.getElementById('boxGps')
      var lt = document.getElementById('latDisplay')
      var ln = document.getElementById('lngDisplay')
      var lk = document.getElementById('mapLinkContainer')

      bx.className = 'box-gps erro'
      lt.textContent = '-'
      ln.textContent = '-'

      if (err.code == err.PERMISSION_DENIED) {
        lk.innerHTML = 'Permissao negada. Permita o GPS nas configuracoes.'
      } else if (err.code == err.POSITION_UNAVAILABLE) {
        lk.innerHTML = 'Sinal indisponivel. Tente em local aberto.'
      } else if (err.code == err.TIMEOUT) {
        lk.innerHTML = 'Tempo esgotado. Tente novamente.'
      } else {
        lk.innerHTML = err.message
      }

      btn.disabled = false
      btn.textContent = 'Capturar Localizacao'
      capturando = false
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  )
}

async function enviar() {
  if (!supabase) {
    mostrarMsg('Erro: Supabase nao conectado. Recarregue a pagina.', 'erro')
    return
  }

  var responsavel = document.getElementById('responsavel').value.trim()
  var endereco = document.getElementById('endereco').value.trim()
  var aluno = document.getElementById('aluno').value.trim()
  var escola = document.getElementById('escola').value
  var ano = document.getElementById('ano').value
  var rota = document.getElementById('rota').value

  if (!responsavel || !endereco || !aluno || !escola || !ano || !rota) {
    mostrarMsg('Preencha todos os campos obrigatorios.', 'erro')
    return
  }

  if (latitude == null) {
    mostrarMsg('Capture a localizacao antes de enviar.', 'erro')
    return
  }

  var btn = document.getElementById('btnEnviar')
  btn.disabled = true
  btn.textContent = 'Enviando...'

  try {
    var result = await supabase
      .from('cadastro_transporte')
      .insert([{ responsavel: responsavel, endereco: endereco, aluno: aluno, escola: escola, ano: ano, rota: rota, latitude: latitude, longitude: longitude }])

    if (result.error) {
      mostrarMsg('Erro ao enviar: ' + result.error.message, 'erro')
    } else {
      mostrarMsg('Registro enviado com sucesso!', 'sucesso')
      limparForm()
    }
  } catch(e) {
    mostrarMsg('Erro de conexao: ' + e.message, 'erro')
  }

  btn.disabled = false
  btn.textContent = 'Enviar Registro'
}

function limparForm() {
  document.getElementById('responsavel').value = ''
  document.getElementById('endereco').value = ''
  document.getElementById('aluno').value = ''
  document.getElementById('escola').value = ''
  document.getElementById('ano').value = ''
  document.getElementById('rota').value = ''
  latitude = null
  longitude = null

  document.getElementById('latDisplay').textContent = '-'
  document.getElementById('lngDisplay').textContent = '-'
  document.getElementById('boxGps').className = 'box-gps'
  document.getElementById('mapLinkContainer').innerHTML = ''
  document.getElementById('btnGps').disabled = false
  document.getElementById('btnGps').textContent = 'Capturar Localizacao'
  document.getElementById('msg').className = 'msg'
  document.getElementById('msg').style.display = 'none'
}

function mostrarMsg(texto, tipo) {
  var el = document.getElementById('msg')
  el.textContent = texto
  el.className = 'msg ' + tipo
  el.style.display = 'block'
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btnGps').addEventListener('click', capturar)
  document.getElementById('btnEnviar').addEventListener('click', enviar)
  document.getElementById('btnLimpar').addEventListener('click', limparForm)
})
</script>
</body>
</html>
